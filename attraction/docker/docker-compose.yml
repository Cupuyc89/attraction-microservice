name: attr_micro_attraction

services:
  attr_micro_attraction_db:
    # image postgres:15.1-alpine3.16
    image: postgres:15.1-alpine3.16
    container_name: attr_micro_attraction_db
    hostname: attr_micro_attraction_db
    restart: always
    env_file: db_config.env
    volumes:
      - attr_micro_attraction_db:/var/lib/postgresql/data
      - ./scripts:/docker-entrypoint-initdb.d
    ports:
      - "127.0.0.1:5434:5432"
    networks:
      - attraction_microservice


volumes:
  attr_micro_attraction_db:

networks:
  attraction_microservice:
    driver: bridge