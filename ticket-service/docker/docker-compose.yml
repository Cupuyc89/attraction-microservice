name: attr_micro_ticket

services:
  attr_micro_ticket_db:
    # image postgres:15.1-alpine3.16
    image: postgres:15.1-alpine3.16
    container_name: attr_micro_ticket_db
    hostname: attr_micro_ticket_db
    restart: always
    env_file: db_config.env
    volumes:
      - attr_micro_ticket_db:/var/lib/postgresql/data
      - ./scripts:/docker-entrypoint-initdb.d
    ports:
      - "127.0.0.1:5435:5432"
    networks:
      - attraction_microservice

  #attr_micro_ticket_app: TODO

volumes:
  attr_micro_ticket_db:

networks:
  attraction_microservice:
    driver: bridge